name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile-check all Python sources
        run: |
          python -m compileall -q genPiHub scripts

  import-test:
    name: Package import + factory surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps + package
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.0,<2.7" --index-url https://download.pytorch.org/whl/cpu
          pip install numpy onnxruntime pyyaml omegaconf
          pip install -e .

      - name: Smoke test the registry
        run: |
          python - <<'PY'
          import genPiHub
          from genPiHub import load_policy  # noqa: F401
          from genPiHub.configs import (
              AMOPolicyConfig,
              CLOTPolicyConfig,
              BeyondMimicPolicyConfig,
              HoloMotionPolicyConfig,
          )
          # Touch each registry entry to confirm the module imports.
          from genPiHub.policies import policy_registry
          for name in ("AMOPolicy", "CLOTPolicy", "BeyondMimicPolicy", "HoloMotionPolicy"):
              assert policy_registry.is_registered(name), f"{name} missing from registry"
          print("registry OK:", sorted(policy_registry.list_registered()))
          PY
